services:
  control-plane-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: control-plane-api
    ports:
      - "${CONTROL_PLANE_PORT:-8082}:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:-host.docker.internal:9092}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://host.docker.internal:5433/combotto}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-combotto}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-combotto}
      SPRING_FLYWAY_DEFAULT_SCHEMA: control_plane
      SPRING_FLYWAY_SCHEMAS: control_plane
      SPRING_FLYWAY_CREATE_SCHEMAS: "true"
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: control_plane
      AUTH_ISSUER_URI: http://localhost:${KEYCLOAK_HOST_PORT:-9000}/realms/combotto
      AUTH_JWK_SET_URI: http://keycloak:8080/realms/combotto/protocol/openid-connect/certs
    depends_on:
      keycloak:
        condition: service_healthy
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    container_name: combotto-keycloak
    ports:
      - "127.0.0.1:${KEYCLOAK_HOST_PORT:-9000}:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-REPLACE_ME_LOCAL_KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-http://localhost:${KEYCLOAK_HOST_PORT:-9000}}
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: ${KEYCLOAK_HEALTH_ENABLED:-true}
      KEYCLOAK_DEMO_READ_CLIENT_ID: ${KEYCLOAK_DEMO_READ_CLIENT_ID:-control-plane-demo-read-cli}
      KEYCLOAK_DEMO_READ_CLIENT_SECRET: ${KEYCLOAK_DEMO_READ_CLIENT_SECRET:-REPLACE_ME_LOCAL_DEMO_READ_CLIENT_SECRET}
      KEYCLOAK_PROMETHEUS_CLIENT_ID: ${KEYCLOAK_PROMETHEUS_CLIENT_ID:-control-plane-prometheus}
      KEYCLOAK_PROMETHEUS_CLIENT_SECRET: ${KEYCLOAK_PROMETHEUS_CLIENT_SECRET:-REPLACE_ME_LOCAL_PROMETHEUS_CLIENT_SECRET}
      KEYCLOAK_DEMO_WRITE_CLIENT_ID: ${KEYCLOAK_DEMO_WRITE_CLIENT_ID:-control-plane-demo-write-cli}
      KEYCLOAK_DEMO_WRITE_CLIENT_SECRET: ${KEYCLOAK_DEMO_WRITE_CLIENT_SECRET:-REPLACE_ME_LOCAL_DEMO_WRITE_CLIENT_SECRET}
      KEYCLOAK_DEMO_READ_USERNAME: ${KEYCLOAK_DEMO_READ_USERNAME:-local-demo-reader}
      KEYCLOAK_DEMO_READ_PASSWORD: ${KEYCLOAK_DEMO_READ_PASSWORD:-REPLACE_ME_LOCAL_DEMO_READ_PASSWORD}
      KEYCLOAK_DEMO_READ_EMAIL: ${KEYCLOAK_DEMO_READ_EMAIL:-local-demo-reader@example.com}
      KEYCLOAK_DEMO_WRITE_USERNAME: ${KEYCLOAK_DEMO_WRITE_USERNAME:-local-demo-writer}
      KEYCLOAK_DEMO_WRITE_PASSWORD: ${KEYCLOAK_DEMO_WRITE_PASSWORD:-REPLACE_ME_LOCAL_DEMO_WRITE_PASSWORD}
      KEYCLOAK_DEMO_WRITE_EMAIL: ${KEYCLOAK_DEMO_WRITE_EMAIL:-local-demo-writer@example.com}
      KEYCLOAK_DEMO_WRITE_NO_ADMIN_USERNAME: ${KEYCLOAK_DEMO_WRITE_NO_ADMIN_USERNAME:-local-demo-writer-no-admin}
      KEYCLOAK_DEMO_WRITE_NO_ADMIN_PASSWORD: ${KEYCLOAK_DEMO_WRITE_NO_ADMIN_PASSWORD:-REPLACE_ME_LOCAL_DEMO_WRITE_NO_ADMIN_PASSWORD}
      KEYCLOAK_DEMO_WRITE_NO_ADMIN_EMAIL: ${KEYCLOAK_DEMO_WRITE_NO_ADMIN_EMAIL:-local-demo-writer-no-admin@example.com}
      KEYCLOAK_DEMO_TENANT_ID: ${KEYCLOAK_DEMO_TENANT_ID:-demo-tenant}
      KEYCLOAK_OTHER_READ_USERNAME: ${KEYCLOAK_OTHER_READ_USERNAME:-local-other-reader}
      KEYCLOAK_OTHER_READ_PASSWORD: ${KEYCLOAK_OTHER_READ_PASSWORD:-REPLACE_ME_LOCAL_OTHER_READ_PASSWORD}
      KEYCLOAK_OTHER_READ_EMAIL: ${KEYCLOAK_OTHER_READ_EMAIL:-local-other-reader@example.com}
      KEYCLOAK_OTHER_WRITE_USERNAME: ${KEYCLOAK_OTHER_WRITE_USERNAME:-local-other-writer}
      KEYCLOAK_OTHER_WRITE_PASSWORD: ${KEYCLOAK_OTHER_WRITE_PASSWORD:-REPLACE_ME_LOCAL_OTHER_WRITE_PASSWORD}
      KEYCLOAK_OTHER_WRITE_EMAIL: ${KEYCLOAK_OTHER_WRITE_EMAIL:-local-other-writer@example.com}
      KEYCLOAK_OTHER_TENANT_ID: ${KEYCLOAK_OTHER_TENANT_ID:-other-tenant}
    volumes:
      - ./keycloak:/opt/keycloak/data/local-config
    entrypoint:
      - /bin/sh
      - -c
    command:
      - sh /opt/keycloak/data/local-config/scripts/render-realm.sh && exec /opt/keycloak/bin/kc.sh start-dev --import-realm
    healthcheck:
      test:
        - CMD-SHELL
        - >
          bash -ec 'exec 3<>/dev/tcp/127.0.0.1/9000;
          printf "GET /health/ready HTTP/1.1\r\nHost: 127.0.0.1\r\n\r\n" >&3;
          timeout 2 cat <&3 | grep -q "\"status\":\"UP\""'
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
